<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Uber with Coordinates</title>

    <style>
      :root{
        --bg: #ffffff;
        --page: #faf7f8;
        --card: #ffffff;

        --text: #1a1a1a;
        --muted: #6b5560;

        --stroke: #ead7de;

        --accent1: #7a1634;
        --accent2: #b0183f;
        --accentGlow: rgba(176, 24, 63, 0.18);

        --danger: #b00020;

        --shadow: 0 14px 40px rgba(38, 18, 24, 0.12);
        --radius: 16px;
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }

      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
        background: linear-gradient(180deg, var(--page), var(--bg));
        color: var(--text);
        min-height: 100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 24px 14px;
      }

      .wrap{ width: min(860px, 100%); }

      .card{
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        overflow:hidden;
      }

      header{
        padding: 20px 20px 14px;
        border-bottom: 1px solid var(--stroke);
      }

      h1{
        margin:0;
        font-size: clamp(20px, 4.8vw, 28px);
        letter-spacing: .2px;
        color: #2a0f18;
      }

      .sub{
        margin-top:10px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 14px;
      }

      form{ padding: 16px 20px 18px; }

      .section-title{
        margin: 16px 0 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .12em;
        color: var(--muted);
      }

      .grid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      label{
        display:block;
        font-weight: 650;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      /* Input + sign button group */
      .input-group{
        display:flex;
        gap: 10px;
        align-items: stretch;
      }

      .sign-btn{
        width: 46px;
        flex: 0 0 46px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: #ffffff;
        color: #2a0f18;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        transition: filter .16s ease, transform .06s ease, box-shadow .16s ease, border-color .18s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .sign-btn:hover{ filter: brightness(0.99); }
      .sign-btn:active{ transform: translateY(1px); }
      .sign-btn:focus{
        outline: none;
        border-color: rgba(176, 24, 63, .55);
        box-shadow: 0 0 0 4px var(--accentGlow);
      }

      input{
        width:100%;
        appearance: none;
        border: 1px solid var(--stroke);
        background: #fff;
        color: var(--text);
        padding: 12px 12px;
        border-radius: 12px;
        font-size: 16px; /* prevents iOS zoom */
        outline: none;
        transition: border-color .18s ease, box-shadow .18s ease;
      }

      input::placeholder{ color: rgba(107,85,96,.55); }

      input:focus{
        border-color: rgba(176, 24, 63, .55);
        box-shadow: 0 0 0 4px var(--accentGlow);
      }

      .actions{
        margin-top: 16px;
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items:center;
      }

      .btn{
        border: 0;
        cursor: pointer;
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: .2px;
        transition: transform .06s ease, filter .16s ease, box-shadow .16s ease;
        user-select:none;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:active{ transform: translateY(1px); }

      .btn-primary{
        color: #ffffff;
        background: linear-gradient(135deg, var(--accent1), var(--accent2));
        box-shadow: 0 10px 22px rgba(122,22,52,.18), 0 8px 18px rgba(176,24,63,.12);
      }

      .btn-secondary{
        color: #2a0f18;
        background: #ffffff;
        border: 1px solid var(--stroke);
      }

      .btn:hover{ filter: brightness(1.03); }

      .hint{
        margin-left:auto;
        color: rgba(107,85,96,.9);
        font-size: 13px;
      }

      .msg{
        margin-top: 12px;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: #fff;
        color: var(--muted);
        display:none;
      }

      .msg.error{
        border-color: rgba(176,0,32,.35);
        background: rgba(176,0,32,.06);
        color: #7a0016;
      }

      .msg.info{
        border-color: rgba(176,24,63,.28);
        background: rgba(176,24,63,.06);
        color: #5a1126;
      }

      footer{
        padding: 12px 20px 16px;
        border-top: 1px solid var(--stroke);
        color: rgba(107,85,96,.85);
        font-size: 12px;
        line-height: 1.45;
        background: #fff;
      }

      @media (max-width: 720px){
        .grid{ grid-template-columns: 1fr; }
        .hint{ width:100%; margin-left:0; }
        .actions{ flex-direction: column; align-items: stretch; }
        .btn{ width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <header>
          <h1>Open Uber with Coordinates</h1>
          <div class="sub">
            Enter pickup and dropoff coordinates, then we’ll open Uber with those locations filled in.
          </div>
        </header>

        <form id="uberForm" novalidate>
          <div class="section-title">Pickup</div>
          <div class="grid">
            <div>
              <label for="pickupLat">Pickup latitude</label>
              <div class="input-group">
                <button class="sign-btn" type="button" data-target="pickupLat" aria-label="Toggle negative for pickup latitude">±</button>
                <input id="pickupLat" type="text" inputmode="decimal" autocomplete="off"
                       placeholder="e.g. 42.05741" />
              </div>
            </div>
            
            <div>
              <label for="pickupLng">Pickup longitude</label>
              <div class="input-group">
                <button class="sign-btn" type="button" data-target="pickupLng" aria-label="Toggle negative for pickup longitude">±</button>
                <input id="pickupLng" type="text" inputmode="decimal" autocomplete="off"
                       placeholder="e.g. -87.67200" />
              </div>
            </div>
          </div>

          <div class="section-title">Dropoff</div>
          <div class="grid">
            <div>
              <label for="dropLat">Dropoff latitude</label>
              <div class="input-group">
                <button class="sign-btn" type="button" data-target="dropLat" aria-label="Toggle negative for dropoff latitude">±</button>
                <input id="dropLat" type="text" inputmode="decimal" autocomplete="off"
                       placeholder="e.g. 41.78985" />
              </div>
            </div>

            <div>
              <label for="dropLng">Dropoff longitude</label>
              <div class="input-group">
                <button class="sign-btn" type="button" data-target="dropLng" aria-label="Toggle negative for dropoff longitude">±</button>
                <input id="dropLng" type="text" inputmode="decimal" autocomplete="off"
                       placeholder="e.g. -87.59723" />
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit">Open in Uber</button>
            <button class="btn btn-secondary" type="button" id="fillSample">Fill sample coords</button>
            <button class="btn btn-secondary" type="button" id="clearCoords">Clear coordinates</button>
            <div class="hint">lat ∈ [-90, 90], lng ∈ [-180, 180]</div>
          </div>

          <div id="msg" class="msg" role="status" aria-live="polite"></div>

          <!-- Hidden anchor used for opening a single new tab -->
          <a id="uberOut" href="#" target="_blank" rel="noopener noreferrer" style="display:none;"></a>
        </form>

        <footer>
          This page will not order a ride. It only opens Uber with your pickup and dropoff filled in so you can review options.
        </footer>
      </div>
    </div>

    <script>
      let msgTimer = null;

      function sanitizeNumericString(s) {
        // Allow digits, leading +/-, and one decimal separator (.,)
        // Also convert commas to dots.
        return s.trim().replace(/,/g, ".");
      }

      function parseNumber(id) {
        const raw = document.getElementById(id).value;
        const v = sanitizeNumericString(raw);
        if (v === "" || v === "-" || v === "+") return null;
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      function inRange(n, min, max) {
        return n >= min && n <= max;
      }

      function showMsg(text, type) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.classList.remove("error", "info");
        el.classList.add(type === "error" ? "error" : "info");
        el.style.display = "block";

        if (msgTimer) clearTimeout(msgTimer);
        msgTimer = setTimeout(() => hideMsg(), 1000);
      }

      function hideMsg() {
        const el = document.getElementById("msg");
        el.textContent = "";
        el.style.display = "none";
        el.classList.remove("error", "info");
        if (msgTimer) {
          clearTimeout(msgTimer);
          msgTimer = null;
        }
      }

      function toggleNegative(inputId) {
        const input = document.getElementById(inputId);
        let v = input.value || "";

        // Keep leading/trailing spaces out of the toggle behavior
        const trimmed = v.trim();

        if (trimmed.startsWith("-")) {
          // Remove ONLY the first leading '-'
          v = trimmed.slice(1);
        } else if (trimmed.startsWith("+")) {
          // Replace leading '+' with '-'
          v = "-" + trimmed.slice(1);
        } else {
          v = "-" + trimmed;
        }

        input.value = v;

        // Put cursor at end for quick typing on mobile
        input.focus();
        try {
          const len = input.value.length;
          input.setSelectionRange(len, len);
        } catch {}
      }

      function buildUberLink(pickLat, pickLng, dropLat, dropLng) {
        const pickupObj = {
          latitude: pickLat,
          longitude: pickLng,
          addressLine1: "Puppy",
          addressLine2: "Cheesecake",
        };

        const dropObj = {
          latitude: dropLat,
          longitude: dropLng,
          addressLine1: "Milkshake",
          addressLine2: "Sinigang",
        };

        const pickupEncoded = encodeURIComponent(JSON.stringify(pickupObj));
        const drop0Encoded = encodeURIComponent(JSON.stringify(dropObj));
        return `https://m.uber.com/looking?pickup=${pickupEncoded}&drop[0]=${drop0Encoded}`;
      }

      // Wire up ± buttons
      document.querySelectorAll(".sign-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const target = btn.getAttribute("data-target");
          if (target) toggleNegative(target);
          hideMsg();
        });
      });

      document.getElementById("uberForm").addEventListener("submit", (e) => {
        e.preventDefault();
        hideMsg();

        const pickupLat = parseNumber("pickupLat");
        const pickupLng = parseNumber("pickupLng");
        const dropLat = parseNumber("dropLat");
        const dropLng = parseNumber("dropLng");

        if ([pickupLat, pickupLng, dropLat, dropLng].some((v) => v === null)) {
          showMsg("Please enter valid numbers for all four fields.", "error");
          return;
        }

        if (!inRange(pickupLat, -90, 90) || !inRange(dropLat, -90, 90)) {
          showMsg("Latitude must be between -90 and 90.", "error");
          return;
        }
        if (!inRange(pickupLng, -180, 180) || !inRange(dropLng, -180, 180)) {
          showMsg("Longitude must be between -180 and 180.", "error");
          return;
        }

        const url = buildUberLink(pickupLat, pickupLng, dropLat, dropLng);
        showMsg("Opening Uber…", "info");

        const a = document.getElementById("uberOut");
        a.href = url;
        a.click();
      });

      document.getElementById("fillSample").addEventListener("click", () => {
  // Northwestern Economics (Kellogg Global Hub) -> UChicago Saieh Hall for Economics
        document.getElementById("pickupLat").value = "42.05741";
        document.getElementById("pickupLng").value = "-87.67200";
        document.getElementById("dropLat").value = "41.78985";
        document.getElementById("dropLng").value = "-87.59723";
        hideMsg();
      });

      document.getElementById("clearCoords").addEventListener("click", () => {
        document.getElementById("pickupLat").value = "";
        document.getElementById("pickupLng").value = "";
        document.getElementById("dropLat").value = "";
        document.getElementById("dropLng").value = "";
        hideMsg();
      });
    </script>
  </body>
</html>
